# .github/workflows/pr-security.yml
# Lives in the CENTRAL repo (workflow-security-pr-check) and is invoked
# org-wide by the "Require workflows to pass before merging" ruleset.
#
# Notes:
# - The ruleset IGNORES on: filters (branches/paths/types) and always runs this
#   on the default activity types of the events below. Keep on: minimal.
# - Secrets resolve from the TARGET repo's context. Put SEMGREP/SONAR tokens as
#   ORGANIZATION secrets so every repo's run can read them.
# - Blocking vs. non-blocking is controlled per-job via continue-on-error.
#   Start strict where signal is high (secrets), soft where it's noisy (lint),
#   then promote jobs to blocking as you tune.

name: PR Security Pipeline

on:
  pull_request:
  # Add pull_request_target ONLY if you accept external fork PRs and need the
  # failure-comment to post on them. It runs in the base-repo context with
  # secrets, so never check out & execute untrusted PR code under it.
  # pull_request_target:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ---- BLOCKING: supply-chain (Shai-Hulud IOCs) ----------------------------
  # Self-contained reusable guard kept in this central repo. Referenced by full
  # repo path so it always resolves here regardless of the target repo the
  # ruleset runs this pipeline in. Ref: SEC-2026-051501.
  shai-hulud-guard:
    name: Supply-chain (Shai-Hulud)
    uses: AvantoDev/workflow-security-pr-check/.github/workflows/shai-hulud-guard.yml@main
    permissions:
      contents: read

  # ---- BLOCKING: secrets ----------------------------------------------------
  secrets-scan:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need base + head commits to scan the PR range
      # Use the open-source gitleaks BINARY (MIT) via its official image.
      # The gitleaks-ACTION wrapper requires a paid GITLEAKS_LICENSE for orgs;
      # the binary does not. --redact hides secret values in logs.
      #
      # PERF: scan ONLY the commits this PR introduces (base..head) via
      # --log-opts, instead of the entire repo history on every PR. This makes
      # the job diff-aware (like OSV/Semgrep) so its cost scales with PR size,
      # not repo age. SHAs are passed via env (not interpolated) for safety.
      # NOTE: a secret already committed in history is NOT re-scanned here — run
      # scripts/gitleaks-baseline.sh once per repo to catch legacy secrets.
      - name: Gitleaks (PR diff)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          # SECURITY: gitleaks AUTO-LOADS .gitleaks.toml from the scanned tree,
          # which on the PR head is UNTRUSTED. A PR could add a secret AND a
          # .gitleaks.toml allowlist suppressing it — the same self-approval
          # bypass we closed for osv-scanner.toml. So we resolve the gitleaks
          # config from the BASE (trusted, already-merged) commit ONLY, and
          # delete any in-tree config so the head's cannot auto-load. New
          # allowlist entries must be merged to the base branch first.
          cfg_mount=() cfg_arg=()
          if git show "$BASE_SHA:.gitleaks.toml" > "${RUNNER_TEMP:-/tmp}/gitleaks-base.toml" 2>/dev/null; then
            cfg_mount=(-v "${RUNNER_TEMP:-/tmp}/gitleaks-base.toml:/config/.gitleaks.toml:ro")
            cfg_arg=(--config /config/.gitleaks.toml)
            echo "Gitleaks: applying allowlist config from base commit's .gitleaks.toml"
          fi
          find . \( -name '.gitleaks.toml' -o -name 'gitleaks.toml' \) -type f -delete
          docker run --rm -v "$PWD:/repo" "${cfg_mount[@]}" -e BASE_SHA -e HEAD_SHA \
            ghcr.io/gitleaks/gitleaks:v8.21.2 \
            detect --source=/repo --redact -v "${cfg_arg[@]}" \
            --log-opts="--no-merges ${BASE_SHA}..${HEAD_SHA}"

  # ---- BLOCKING: SAST -------------------------------------------------------
  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: "p/security-audit p/secrets p/owasp-top-ten"
          # Optional: set as an org secret to send findings to Semgrep Cloud.
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ---- BLOCKING (PR-diff): dependencies (SCA) — multi-ecosystem ------------
  # OSV-Scanner auto-detects lockfiles across npm, PyPI, Go, Cargo, Maven/Gradle,
  # RubyGems, Composer, NuGet, etc. — so non-JS/Python repos aren't left unscanned.
  # Runs in PR-DIFF mode: scans the PR base and head commits, then fails ONLY on
  # vulns newly introduced by this PR (keys present at head but not at base) — so
  # pre-existing debt doesn't block every PR. We still avoid the SARIF upload path
  # that would otherwise require GitHub Advanced Security (GHAS) on private repos.
  sca-scan:
    name: Dependencies (OSV-Scanner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can check out base + head
      # Run the pinned official OSV-Scanner image directly. Avoids the action
      # wrapper (whose tag had no valid action.yml) and the SARIF upload path
      # that would otherwise require GitHub Advanced Security on private repos.
      # SHAs are passed via env (not interpolated into the script) to keep
      # zizmor/actionlint happy and avoid any template-injection vector.
      - name: OSV-Scanner (PR diff)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail

          # Extract a stable vuln key set from an OSV-Scanner JSON report:
          #   id|package-name|package-version  (sorted, unique)
          # Missing/empty file yields empty output (fail-safe: base treated as
          # having no vulns, so everything at head looks "new").
          vuln_keys() {
            local file="$1"
            [ -s "$file" ] || return 0
            jq -r '.results[]?.packages[]? as $p
                   | $p.vulnerabilities[]?.id
                   | "\(.)|\($p.package.name)|\($p.package.version)"' \
              "$file" 2>/dev/null | sort -u
          }

          # A repo-root osv-scanner.toml lets a repo deliberately ignore a
          # specific advisory (e.g. a still-vulnerable dep with no fix yet).
          # SECURITY: the ignore config is resolved from the BASE (trusted,
          # already-merged) commit ONLY — never from PR head. Otherwise a PR
          # could introduce a vuln AND self-approve its own ignore in the same
          # change, bypassing the gate. New ignore entries must therefore be
          # merged to the base branch first (passing review) before they apply.
          cfg_mount=() cfg_arg=()
          if git show "$BASE_SHA:osv-scanner.toml" > "${RUNNER_TEMP:-/tmp}/osv-base.toml" 2>/dev/null; then
            cfg_mount=(-v "${RUNNER_TEMP:-/tmp}/osv-base.toml:/config/osv-scanner.toml:ro")
            cfg_arg=(--config /config/osv-scanner.toml)
            echo "OSV-Scanner: applying ignore config from base commit's osv-scanner.toml"
          fi

          scan() {
            local sha="$1" out="$2"
            git checkout -f "$sha" -q
            # SECURITY: OSV-Scanner AUTO-LOADS any osv-scanner.toml found in the
            # scanned tree, independent of --config. Delete all in-tree configs
            # after checkout so an untrusted ignore list from the PR head can
            # never auto-apply; the only ignores honored are the base config
            # supplied via --config above.
            find . -name osv-scanner.toml -type f -delete
            docker run --rm -v "$PWD:/src" "${cfg_mount[@]}" \
              ghcr.io/google/osv-scanner:v1.9.1 "${cfg_arg[@]}" \
              --recursive --format json /src > "$out" || true
          }

          scan "$BASE_SHA" base.json
          scan "$HEAD_SHA" head.json

          vuln_keys base.json > base.txt
          vuln_keys head.json > head.txt

          # Keys in head but not in base = newly-introduced vulnerable deps.
          comm -13 base.txt head.txt > new.txt

          if [ -s new.txt ]; then
            echo "::error::OSV-Scanner: this PR introduces new vulnerable dependencies:"
            cat new.txt
            exit 1
          fi
          echo "OSV-Scanner: no newly-introduced vulnerable dependencies."

  # ---- NON-BLOCKING to start: GitHub Actions workflow security -------------
  # Split into two independent jobs so they run in parallel. actionlint catches
  # workflow syntax/expression errors; zizmor audits for Actions-specific
  # security issues (injection, unpinned actions, over-broad permissions,
  # credential leaks). Warn-only to start; promote once tuned.
  actionlint:
    name: Actions lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
        continue-on-error: true   # warn-only; remove to make blocking

  zizmor:
    name: Actions security (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: zizmor
        run: |
          pipx install zizmor
          zizmor --persona=regular .github/workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # warn-only; remove to make blocking

  # ---- NON-BLOCKING to start: Dockerfile lint ------------------------------
  dockerfile-lint:
    name: Dockerfile (Hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Hadolint
        if: ${{ hashFiles('**/Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
        continue-on-error: true   # warn-only; remove this line to make it block

  # ---- Failure comment ------------------------------------------------------
  comment-on-failure:
    name: Comment on failure
    runs-on: ubuntu-latest
    needs: [shai-hulud-guard, secrets-scan, sast-scan, sca-scan]
    if: failure()
    steps:
      - uses: mshick/add-pr-comment@v2
        with:
          message: |
            ## 🚨 Security Pipeline Failed
            One or more **required** security checks failed on this PR.
            Open the **Checks** tab for details. Merge is blocked until they pass.
